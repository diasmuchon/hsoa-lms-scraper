name: LMS Sync Scraper

on:
  workflow_dispatch:
    inputs:
      studentId:
        description: 'Student ID to scrape'
        required: true
      spreadsheetRow:
        description: 'Row number in Google Sheet'
        required: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install playwright gspread oauth2client
          playwright install chromium

      - name: Run LMS scraper
        env:
          STUDENT_ID: ${{ github.event.inputs.studentId }}
          SPREADSHEET_ROW: ${{ github.event.inputs.spreadsheetRow }}
          GCP_CREDS_JSON: ${{ secrets.GCP_CREDS_JSON }}
          LMS_PASSWORD: ${{ secrets.LMS_PASS }}
          LMS_USERNAME: ${{ secrets.LMS_USER }}
        run: |
          python scraper.py
          echo "Scraper completed for student ID: $STUDENT_ID, row: $SPREADSHEET_ROW"
