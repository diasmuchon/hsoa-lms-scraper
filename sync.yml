name: HSOA Gradebook Checker

on:
  workflow_dispatch:
    inputs:
      student_ids:
        description: 'Comma-separated student IDs (optional, can use env var)'
        required: false
        default: ''
      upload_sheets:
        description: 'Upload to Google Sheets'
        type: boolean
        default: true
      no_headless:
        description: 'Run in visible mode (for debugging)'
        type: boolean
        default: false

jobs:
  check-gradebook:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Gradebook Checker
      env:
        HSOA_USERNAME: ${{ secrets.HSOA_USERNAME }}
        HSOA_PASSWORD: ${{ secrets.HSOA_PASSWORD }}
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
        STUDENT_IDS: ${{ github.event.inputs.student_ids || secrets.STUDENT_IDS }}
      run: |
        python gradebook_checker.py \
          --students "${{ github.event.inputs.student_ids || '' }}" \
          --output "gradebook_report_$(date +%Y%m%d_%H%M%S).csv" \
          ${{ github.event.inputs.upload_sheets && '--upload-sheets' || '' }} \
          ${{ github.event.inputs.no_headless && '--no-headless' || '' }}
    
    - name: Upload CSV artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: gradebook-reports
        path: "gradebook_report_*.csv"
    
    - name: Upload logs
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: debug-screenshots
        path: "*.png"
