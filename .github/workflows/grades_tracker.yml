name: Grades Progress Tracker

on:
  schedule:
    - cron: '0 8 * * 1'  # Run every Monday at 8 AM
  workflow_dispatch:    # Allow manual triggering without inputs

jobs:
  track-grades:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run Grades Tracker
      env:
        HSOA_USERNAME: ${{ secrets.HSOA_USERNAME }}
        HSOA_PASSWORD: ${{ secrets.HSOA_PASSWORD }}
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
        GOOGLE_SHEET_NAME: GRADES_PROGRESS
        STUDENTS_SHEET_NAME: STUDENTS
      run: |
        python grades_tracker.py --workers 3
